<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Société de la Sentence et du Peu</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F7F4EF;
    --ink: #1A1814;
    --ink-light: #6B6560;
    --ink-faint: #B0AAA3;
    --border: #DDD9D3;
    --border-light: #EAE6E0;
    --serif: 'EB Garamond', Georgia, serif;
    --sans: 'Inter', system-ui, sans-serif;
  }

  html { background: var(--cream); color: var(--ink); }

  body {
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1.5rem 4rem;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    margin-bottom: 3rem;
    padding-bottom: 2rem;
    border-bottom: 0.5px solid var(--border);
    width: 100%;
    max-width: 640px;
  }

  .soc-name {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: var(--ink);
    margin-bottom: 5px;
  }

  .soc-sub {
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  /* ── MAIN ── */
  main {
    width: 100%;
    max-width: 640px;
  }

  /* ── FILTERS ── */
  .filter-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 10px;
  }

  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 2rem;
  }

  .fb {
    padding: 5px 13px;
    border: 0.5px solid var(--border);
    border-radius: 99px;
    background: transparent;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 400;
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.15s;
  }
  .fb:hover { color: var(--ink); border-color: var(--ink-light); }
  .fb.active { background: var(--ink); color: var(--cream); border-color: var(--ink); }

  /* ── CARD ── */
  .card {
    background: white;
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 2.25rem 2rem 1.75rem;
    margin-bottom: 1.25rem;
    min-height: 220px;
    display: flex;
    flex-direction: column;
    transition: opacity 0.2s;
  }

  .genre-tag {
    font-family: var(--sans);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 1.25rem;
  }

  .sentence-orig {
    font-family: var(--serif);
    font-size: 21px;
    line-height: 1.7;
    color: var(--ink);
    font-style: italic;
    flex: 1;
    margin-bottom: 1.5rem;
  }

  .sentence-tr {
    font-family: var(--serif);
    font-size: 15px;
    line-height: 1.7;
    color: var(--ink-light);
    font-style: italic;
    padding-top: 1.25rem;
    border-top: 0.5px solid var(--border-light);
    margin-bottom: 1.25rem;
    display: none;
  }

  .card-meta {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .author { font-family: var(--sans); font-size: 13px; font-weight: 500; color: var(--ink); }
  .source { font-family: var(--sans); font-size: 12px; color: var(--ink-light); margin-top: 3px; }
  .counter { font-family: var(--sans); font-size: 11px; color: var(--ink-faint); }

  /* ── TRANSLATION ROW ── */
  .tr-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1rem;
  }

  .tr-btn {
    flex: 1;
    padding: 9px 12px;
    border: 0.5px solid var(--border);
    border-radius: 8px;
    background: transparent;
    font-family: var(--sans);
    font-size: 12px;
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .tr-btn:hover { color: var(--ink); border-color: var(--ink-light); }
  .tr-btn.active { border-color: var(--ink); color: var(--ink); background: rgba(26,24,20,0.04); }
  .tr-btn.sm { flex: 0 0 auto; padding: 9px 14px; }

  /* ── NAV ROW ── */
  .nav-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }

  .btn {
    flex: 1;
    padding: 11px 16px;
    border: 0.5px solid var(--border);
    border-radius: 8px;
    background: white;
    font-family: var(--sans);
    font-size: 13px;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { background: var(--cream); border-color: var(--ink-light); }
  .btn:active { transform: scale(0.98); }
  .btn.icon { flex: 0 0 auto; padding: 11px 14px; font-size: 16px; }
  .btn.share-btn { flex: 0 0 auto; color: var(--ink-light); }

  /* ── SHARE MENU ── */
  .share-menu {
    background: white;
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
    margin-bottom: 10px;
    display: none;
  }
  .share-menu.open { display: block; }

  .share-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 10px;
    font-family: var(--sans);
  }

  .share-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .share-opt {
    padding: 9px 14px;
    border: 0.5px solid var(--border);
    border-radius: 8px;
    background: transparent;
    font-family: var(--sans);
    font-size: 12px;
    color: var(--ink-light);
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .share-opt:hover { background: var(--cream); color: var(--ink); }

  /* ── VOTE ROW ── */
  .vote-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .vote-btn {
    padding: 8px 14px;
    border: 0.5px solid var(--border-light);
    border-radius: 8px;
    background: transparent;
    font-family: var(--sans);
    font-size: 12px;
    color: var(--ink-faint);
    cursor: default;
    opacity: 0.7;
    line-height: 1.3;
    text-align: center;
  }

  .bientot {
    display: block;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-top: 2px;
  }

  .vote-spacer { flex: 1; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--cream);
    border-radius: 8px;
    padding: 10px 20px;
    font-family: var(--sans);
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }
  .toast.show { opacity: 1; }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    body { padding: 2rem 1rem 3rem; }
    .sentence-orig { font-size: 18px; }
    .share-grid { grid-template-columns: 1fr; }
    .soc-name { font-size: 18px; }
  }
</style>

  </div>

  <div class="nav-row">
    <button class="btn" onclick="nextOne()">siguiente →</button>
    <button class="btn icon" onclick="randomOne()" title="al azar">⚄</button>

      <button class="share-opt" onclick="shareTo('twitter')">✕ X / Twitter</button>
      <button class="share-opt" onclick="shareTo('telegram')">✈ Telegram</button>
    </div>
  </div>

  <div class="vote-row">
    <button class="vote-btn">▲ voter<span class="bientot">bientôt</span></button>
    <button class="vote-btn">▼<span class="bientot">bientôt</span></button>
    <div class="vote-spacer"></div>
    <button class="vote-btn">⊞ ranking<span class="bientot">bientôt</span></button>
  </div>
</main>

<div class="toast" id="toast"></div>

let currentFilter = 'all';
let idx = 0;
let currentLang = 'orig';

function getPool() {
  return currentFilter === 'all' ? corpus : corpus.filter(a => a.author === currentFilter);
}

function show(entry) {
  currentLang = 'orig';
  document.getElementById('sentence-orig').textContent = '\u00AB\u00A0' + entry.text + '\u00A0\u00BB';
  document.getElementById('genre-tag').textContent = entry.genre;
  document.getElementById('author-name').textContent = entry.author;
  document.getElementById('source-name').textContent = entry.source;
  const p = getPool();
  document.getElementById('counter').textContent = (idx + 1) + '\u00A0/\u00A0' + p.length;
  const tr = document.getElementById('sentence-tr');
  tr.style.display = 'none';
  tr.textContent = '';
  document.querySelectorAll('.tr-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('share-menu').classList.remove('open');
}

function showLang(lang) {
  const p = getPool();
  const entry = p[idx];
  currentLang = lang;
  const tr = document.getElementById('sentence-tr');
  document.querySelectorAll('.tr-btn').forEach(b => b.classList.remove('active'));
  if (lang === 'orig') {
    tr.style.display = 'none';
  } else {
    document.getElementById('btn-' + lang).classList.add('active');
    tr.style.display = 'block';
    tr.textContent = entry[lang] || '(traducción no disponible)';
  }
}

function nextOne() {
  const p = getPool();
  idx = (idx + 1) % p.length;
  show(p[idx]);
}

function randomOne() {
  const p = getPool();
  const r = Math.floor(Math.random() * p.length);
  idx = r;
  show(p[r]);
}

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('[data-f]');
  if (!btn) return;
  currentFilter = btn.dataset.f;
  document.querySelectorAll('.fb').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  idx = 0;
  const p = getPool();
  if (p.length) show(p[0]);
});

function toggleShare() {
  document.getElementById('share-menu').classList.toggle('open');
}

function getShareText() {
  const p = getPool();
  const entry = p[idx];
  const tr = document.getElementById('sentence-tr');
  let text = '\u00AB\u00A0' + entry.text + '\u00A0\u00BB';
  if (tr.style.display !== 'none' && tr.textContent) {
    text += '\n\n' + tr.textContent;
  }
  text += '\n\n\u2014 ' + entry.author + ', ' + entry.source;
  text += '\n\nSoci\u00e9t\u00e9 de la Sentence et du Peu';
  return text;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function shareTo(target) {
  const text = getShareText();
  const enc = encodeURIComponent(text);
  if (target === 'copy') {
    navigator.clipboard.writeText(text).then(() => showToast('copiado al portapapeles ✓'));
  } else if (target === 'whatsapp') {
    window.open('https://wa.me/?text=' + enc);
  } else if (target === 'twitter') {
    const p = getPool();
    const entry = p[idx];
    const short = '\u00AB ' + entry.text + ' \u00BB \u2014 ' + entry.author + '\n\nSoci\u00e9t\u00e9 de la Sentence et du Peu';
    window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(short));
  } else if (target === 'telegram') {
    window.open('https://t.me/share/url?text=' + enc);
  }
  document.getElementById('share-menu').classList.remove('open');
}

// Init
show(corpus[Math.floor(Math.random() * corpus.length)]);
</script>
